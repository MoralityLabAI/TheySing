<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#03090d" />
  <meta name="description" content="They Sing: an evidence observatory for ASI diplomacy, collaboration, and institutional capture." />
  <title>They Sing | Collaboration Evidence Observatory</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020308;
      color: #eee;
      font-family: 'IBM Plex Mono', monospace;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    canvas { display: block; }
    .loading-screen {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 42%, rgba(39, 122, 135, 0.2), transparent 30%),
        #020308;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loading-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 8px;
      color: #f0e8d5;
      margin-bottom: 30px;
      text-shadow: 0 0 30px rgba(113, 220, 232, 0.42);
    }
    .loading-bar {
      width: 220px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }
    .loading-progress {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #71dce8, #e66a52);
      animation: loading 1.5s ease-in-out infinite;
      transition: width 180ms ease-out;
    }
    @keyframes loading {
      0% { width: 0; margin-left: 0; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0; margin-left: 100%; }
    }
    .loading-subtitle {
      margin-top: 20px;
      font-size: 10px;
      letter-spacing: 3px;
      color: #718287;
      text-transform: uppercase;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="loading-screen" id="loading">
    <div class="loading-title">THEY SING</div>
    <div class="loading-bar"><div class="loading-progress"></div></div>
    <div class="loading-subtitle">Opening the Babel evidence archive</div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    const loadingScreen = document.getElementById('loading');
    const loadingSubtitle = loadingScreen?.querySelector('.loading-subtitle');
    const loadingProgress = loadingScreen?.querySelector('.loading-progress');
    const hideLoading = () => loadingScreen?.classList.add('hidden');

    window.addEventListener('theysing:loading', (event) => {
      const detail = event.detail || {};
      if (loadingSubtitle && detail.label) loadingSubtitle.textContent = detail.label;
      if (loadingProgress && Number.isFinite(detail.percent)) {
        loadingProgress.style.animation = 'none';
        loadingProgress.style.marginLeft = '0';
        loadingProgress.style.width = `${Math.max(2, Math.min(100, detail.percent))}%`;
      }
    });
    window.addEventListener('theysing:ready', hideLoading, { once: true });
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (loadingScreen && !loadingScreen.classList.contains('hidden') && loadingSubtitle) {
          loadingSubtitle.textContent = 'Still loading / check network if this persists';
        }
      }, 30000);
    }, { once: true });
  </script>
</body>
</html>
